name: Daily Huddle Report

on:
  schedule:
    # Mon–Fri at 13:00 UTC = 8:00 AM ET (9:00 AM EDT in summer)
    - cron: "0 13 * * 1-5"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to commit the updated index.html

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python generate_report.py

      - name: Commit and push updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if something changed
          git diff --staged --quiet || git commit -m "📊 Daily Huddle Report — $(date +'%B %-d, %Y')"
          git push
